<div class="toast-container d-flex flex-column gap-2" dir="rtl">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="toast toast-{{ toast.type }} d-flex align-items-center gap-2"
      [@toastAnim]
      (click)="dismiss(toast.id)"
    >
      <span class="toast-icon flex-shrink-0">{{ getIcon(toast.type) }}</span>
      <span class="toast-msg flex-grow-1">{{ toast.message }}</span>
      <button class="toast-close" (click)="dismiss(toast.id)">×</button>
    </div>
  }
</div>
