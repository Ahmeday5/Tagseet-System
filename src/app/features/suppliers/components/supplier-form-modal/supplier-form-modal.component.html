<app-modal
  [open]="open()"
  [title]="title()"
  size="md"
  [closeOnBackdrop]="!submitting()"
  [closeOnEsc]="!submitting()"
  (closed)="close()"
>
  <form
    [formGroup]="form"
    (ngSubmit)="onSubmit()"
    novalidate
    autocomplete="off"
  >
    <div class="row g-3">
      <div class="col-12">
        <label class="form-label">اسم المورد</label>
        <input
          type="text"
          class="form-control"
          formControlName="fullName"
          autocomplete="off"
          placeholder="مثال: شركة التقنية المتقدمة"
          [class.is-invalid]="isInvalid('fullName')"
        />
        <app-form-error [control]="form.controls.fullName" label="اسم المورد" />
      </div>

      <div class="col-12 col-md-6">
        <label class="form-label">رقم الهاتف</label>
        <input
          type="tel"
          dir="ltr"
          class="form-control"
          formControlName="phoneNumber"
          autocomplete="off"
          placeholder="01xxxxxxxxx"
          [class.is-invalid]="isInvalid('phoneNumber')"
        />
        <app-form-error
          [control]="form.controls.phoneNumber"
          label="رقم الهاتف"
        />
      </div>

      <div class="col-12 col-md-6">
        <label class="form-label">العنوان</label>
        <input
          type="text"
          class="form-control"
          formControlName="address"
          autocomplete="off"
          placeholder="مثال: المنصورة، مصر"
          [class.is-invalid]="isInvalid('address')"
        />
        <app-form-error [control]="form.controls.address" label="العنوان" />
      </div>
    </div>

    @if (serverError(); as msg) {
      <div class="alert alert-danger mt-3 mb-0" role="alert" style="font-size:11px;">
        {{ msg }}
      </div>
    }
  </form>

  <ng-container modal-footer>
    <button
      type="button"
      class="btn"
      [disabled]="submitting()"
      (click)="close()"
    >
      {{ isView() ? 'إغلاق' : 'إلغاء' }}
    </button>

    @if (submitLabel(); as label) {
      <button
        type="button"
        class="btn btn-bl d-inline-flex align-items-center gap-2"
        [disabled]="submitting() || form.invalid"
        (click)="onSubmit()"
      >
        @if (submitting()) {
          <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
        }
        <span>{{ submitting() ? 'جاري الحفظ...' : label }}</span>
      </button>
    }
  </ng-container>
</app-modal>
