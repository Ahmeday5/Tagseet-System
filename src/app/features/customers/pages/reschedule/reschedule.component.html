<div class="alert alert-primary mb-3">
  <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
    <circle cx="6.5" cy="6.5" r="6" stroke="currentColor" stroke-width="1.1"/>
    <path d="M6.5 3.5v3.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
    <circle cx="6.5" cy="9.5" r=".6" fill="currentColor"/>
  </svg>
  إعادة الجدولة تتطلب موافقة المدير — سيتم تسجيل العملية في سجل التدقيق تلقائياً
</div>

<div class="row g-3">

  <!-- ── Form ── -->
  <div class="col-12 col-md-6">
    <div class="card">
      <div class="ct mb-2">بيانات إعادة الجدولة</div>
      <div class="row g-2">
        <div class="col-12 col-sm-6">
          <label class="form-label">اختر العميل</label>
          <select class="form-select">
            @for (c of customers(); track c.id) {
              <option>{{ c.name }} — {{ c.product }}</option>
            }
          </select>
        </div>
        <div class="col-12 col-sm-6">
          <label class="form-label">سبب إعادة الجدولة</label>
          <select class="form-select">
            <option>ظروف مالية طارئة</option>
            <option>طلب العميل</option>
            <option>تأخر في الدفع</option>
            <option>أخرى</option>
          </select>
        </div>
        <div class="col-12 col-sm-6">
          <label class="form-label">نوع الجدولة الجديدة</label>
          <select class="form-select">
            <option>تمديد المدة</option>
            <option>تخفيض قيمة القسط</option>
            <option>تأجيل أقساط معينة</option>
            <option>دمج الأقساط المتأخرة</option>
          </select>
        </div>
        <div class="col-12 col-sm-6">
          <label class="form-label">عدد الأقساط الجديدة</label>
          <input type="number" class="form-control" value="15" />
        </div>
        <div class="col-12 col-sm-6">
          <label class="form-label">تاريخ بدء الجدولة الجديدة</label>
          <input type="date" class="form-control" />
        </div>
        <div class="col-12 col-sm-6">
          <label class="form-label">رسوم إعادة الجدولة (ر.س)</label>
          <input type="number" class="form-control" value="0" />
        </div>
        <div class="col-12">
          <label class="form-label">ملاحظات المدير</label>
          <textarea class="form-control" rows="2" placeholder="سبب القبول أو الرفض..."></textarea>
        </div>
      </div>
      <div class="d-flex gap-2 mt-3">
        <button class="btn btn-bl flex-fill" (click)="submit()">حفظ وإرسال للموافقة</button>
        <button class="btn btn-wa flex-fill">📱 إبلاغ العميل WhatsApp</button>
      </div>
    </div>
  </div>

  <!-- ── Previous requests ── -->
  <div class="col-12 col-md-6">
    <div class="card">
      <div class="chdr"><div class="ct">طلبات إعادة الجدولة السابقة</div></div>
      <div class="tw" style="margin-bottom:0">
        <table class="table">
          <thead>
            <tr>
              <th>العميل</th>
              <th>النوع</th>
              <th>التاريخ</th>
              <th>الحالة</th>
            </tr>
          </thead>
          <tbody>
            @for (r of rescheduleRequests(); track r.id) {
              <tr>
                <td>{{ r.customerName }}</td>
                <td>{{ r.type }}</td>
                <td>{{ r.date }}</td>
                <td><app-badge [text]="getStatusLabel(r.status)" [type]="getStatusBadge(r.status)" /></td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>
